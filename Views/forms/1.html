<!-- ── HTML ──────────────────────────────────────────────────────── -->
<h2 class="form-title">Formulario</h2>

<div class="form-grid">

    <div class="form-group">
        <label for="fecha">Fecha</label>
        <input type="date" id="fecha" name="fecha">
    </div>

    <div class="form-group">
        <label for="importe">Importe</label>
        <input type="number" id="importe" name="importe" placeholder="0.00" step="0.01">
    </div>

    <div class="form-group">
        <label for="cuenta">Cuenta</label>
        <select id="cuenta" name="cuenta">
            <option value="">Seleccionar...</option>
            <option value="caja">Caja</option>
            <option value="banco">Banco</option>
        </select>
    </div>

    <div class="form-group">
        <label for="tipo">Tipo</label>
        <select id="tipo" name="tipo">
            <option value="">Seleccionar...</option>
            <option value="ingreso">Ingreso</option>
            <option value="egreso">Egreso</option>
        </select>
    </div>

    <div class="form-group">
        <label for="concepto">Concepto</label>
        <input type="text" id="concepto" name="concepto" placeholder="Descripción del movimiento...">
    </div>

</div>

<div class="form-actions">
    <button class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
    <button class="btn btn-primary">Guardar</button>
</div>
